<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow">
        <div class="card-header">
          <h3>Login</h3>
        </div>

        <div class="card-body">

          <form [formGroup]="loginForm"
                (ngSubmit)="login()">

            <div class="mb-3">
              <label>Email</label>
              <input
                type="email"
                class="form-control"
                formControlName="email">
            </div>

            <div class="mb-3">
              <label>Password</label>
              <input
                type="password"
                class="form-control"
                formControlName="password">
            </div>

            <button
              class="btn btn-primary"
              type="submit">
              Login
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
